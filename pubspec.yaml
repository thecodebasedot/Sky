name: sky
description: "Sky — a cross-platform mobile communication app for messaging, calls, media and status updates."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter

  # UI / icons
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1

  # State management (lightweight, easy to swap later)
  provider: ^6.1.2

  # Backend — Firebase (used when built with --dart-define=USE_FIREBASE=true;
  # see docs/FIREBASE_SETUP.md). The app runs without any Firebase config when
  # the flag is off.
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2

  # Media capture (used on the Firebase path; mock returns a sample image)
  image_picker: ^1.1.2

  # Real-time voice/video (used on the Firebase path with Firestore signaling)
  flutter_webrtc: ^0.12.5

  # End-to-end encryption (pure Dart: X25519 key agreement + AES-GCM)
  cryptography: ^2.7.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  # assets:
  #   - assets/images/
