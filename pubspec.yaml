name: sky
description: "Sky — a cross-platform mobile communication app for messaging, calls, media and status updates."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter

  # UI / icons
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1

  # State management (lightweight, easy to swap later)
  provider: ^6.1.2

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  # assets:
  #   - assets/images/
